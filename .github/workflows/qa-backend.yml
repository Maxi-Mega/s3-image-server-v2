name: QA / Backend

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Run tests
        run: go test -v ./...

      - name: Run tests with race detection
        run: go test -race -v ./...

      - name: Evaluate test coverage
        run: |
          go test -coverpkg=./... -coverprofile=coverage.out -covermode=count ./...
          grep -v "generated.go" coverage.out > coverage.filtered.out # remove generated files from coverage report
          total=$(go tool cover -func=coverage.filtered.out | awk '/^total:/ {print $3}')
          echo "### Test coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total coverage: **$total**" >> "$GITHUB_STEP_SUMMARY"
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: "v2.11.1"
          args: "--color=always"
