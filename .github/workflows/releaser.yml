name: Release drafter

on:
  workflow_run:
    workflows:
      - "QA"
    types:
      - completed
    branches:
      - "main"
  workflow_dispatch:  # allows manual runs

permissions:
  contents: write

env:
  IMAGE_NAME: s3-image-server-builder
  REGISTRY: ghcr.io
  IMAGE_PLATFORMS: linux/amd64 linux/arm64

jobs:
  draft-release:
    name: Draft release
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve release tag for tested commit
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${GITHUB_SHA}"
          fi
          TAG="$(git tag --points-at "$SHA" | sort -V | tail -n1)"
          if [ -z "$TAG" ]; then
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.resolve-tag.outputs.has_tag == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        if: steps.resolve-tag.outputs.has_tag == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Build amd64 and arm64 Docker image archives
        if: steps.resolve-tag.outputs.has_tag == 'true'
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"

          for PLATFORM in ${{ env.IMAGE_PLATFORMS }}; do
            ARCH="${PLATFORM#linux/}"
            TAR="${{ env.IMAGE_NAME }}-${TAG}-linux-${ARCH}.tar"

            docker buildx build \
              --file ./builder.Dockerfile \
              --platform "${PLATFORM}" \
              --build-arg "VERSION=${TAG}" \
              --tag "${{ env.IMAGE_NAME }}:${TAG}-${ARCH}" \
              --tag "${{ env.IMAGE_NAME }}:latest-${ARCH}" \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --output "type=docker,dest=${TAR}" \
              .

            gzip -9 "${TAR}"
          done

          echo "ARCHIVE_GLOB=${{ env.IMAGE_NAME }}-${TAG}-linux-*.tar.gz" >> "$GITHUB_ENV"

      - name: Create release draft
        if: steps.resolve-tag.outputs.has_tag == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: "${{ steps.resolve-tag.outputs.tag }}"
          tag: "${{ steps.resolve-tag.outputs.tag }}"
          draft: true
          artifacts: "${{ env.ARCHIVE_GLOB }}"
          makeLatest: true
