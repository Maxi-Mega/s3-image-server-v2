name: Release drafter

on:
  workflow_run:
    workflows:
      - "QA"
    types:
      - completed
    branches:
      - "main"
  workflow_dispatch:  # allows manual runs

permissions:
  contents: write

env:
  IMAGE_NAME: s3-image-server-builder
  REGISTRY: ghcr.io

jobs:
  draft-release:
    name: Draft release
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve release tag for tested commit
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${GITHUB_SHA}"
          fi
          TAG="$(git tag --points-at "$SHA" | sort -V | tail -n1)"
          if [ -z "$TAG" ]; then
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.resolve-tag.outputs.has_tag == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64) and load to local docker
        if: steps.resolve-tag.outputs.has_tag == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./builder.Dockerfile
          platforms: linux/amd64
          load: true
          build-args: |
            VERSION=${{ steps.resolve-tag.outputs.tag }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.resolve-tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image to tar
        if: steps.resolve-tag.outputs.has_tag == 'true'
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ steps.resolve-tag.outputs.tag }}"
          TAR="${{ env.IMAGE_NAME }}-${{ steps.resolve-tag.outputs.tag }}.tar"
          docker image save "$IMAGE" -o "$TAR"
          gzip -9 "$TAR"
          echo "ARCHIVE=${TAR}.gz" >> $GITHUB_ENV

      - name: Create release draft
        if: steps.resolve-tag.outputs.has_tag == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: "${{ steps.resolve-tag.outputs.tag }}"
          tag: "${{ steps.resolve-tag.outputs.tag }}"
          draft: true
          artifacts: "${{ env.ARCHIVE }}"
          makeLatest: true
