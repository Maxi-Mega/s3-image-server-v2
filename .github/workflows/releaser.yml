name: Release drafter

on:
  workflow_run:
    workflows:
      - "QA"
    types:
      - completed
    branches:
      - "main"
  workflow_dispatch:  # allows manual runs

permissions:
  contents: write

env:
  IMAGE_NAME: s3-image-server-builder
  REGISTRY: ghcr.io
  IMAGE_TARGETS: >-
    [{"platform":"linux/amd64","arch":"amd64"},{"platform":"linux/arm64","arch":"arm64"}]

jobs:
  prepare-release:
    name: Prepare release
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_tag: ${{ steps.resolve-tag.outputs.has_tag }}
      tag: ${{ steps.resolve-tag.outputs.tag }}
      image_targets: ${{ steps.set-image-targets.outputs.image_targets }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve release tag for tested commit
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${GITHUB_SHA}"
          fi
          TAG="$(git tag --points-at "$SHA" | sort -V | tail -n1)"
          if [ -z "$TAG" ]; then
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set image targets
        id: set-image-targets
        run: echo 'image_targets=${{ env.IMAGE_TARGETS }}' >> "$GITHUB_OUTPUT"

  build-image:
    name: Build image (${{ matrix.arch }})
    needs: prepare-release
    if: needs.prepare-release.outputs.has_tag == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare-release.outputs.image_targets) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build Docker image archive
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          TAR="${{ env.IMAGE_NAME }}-${TAG}-linux-${{ matrix.arch }}.tar"

          docker buildx build \
            --file ./builder.Dockerfile \
            --platform "${{ matrix.platform }}" \
            --build-arg "VERSION=${TAG}" \
            --tag "${{ env.IMAGE_NAME }}:${TAG}" \
            --tag "${{ env.IMAGE_NAME }}:latest" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output "type=docker,dest=${TAR}" \
            .

          gzip -9 "${TAR}"

      - name: Upload Docker image archive
        uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.arch }}
          path: ${{ env.IMAGE_NAME }}-${{ needs.prepare-release.outputs.tag }}-linux-${{ matrix.arch }}.tar.gz

  draft-release:
    name: Draft release
    needs:
      - prepare-release
      - build-image
    if: needs.prepare-release.outputs.has_tag == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Docker image archives
        uses: actions/download-artifact@v8
        with:
          pattern: image-*
          merge-multiple: true
          path: dist

      - name: Create release draft
        uses: ncipollo/release-action@v1
        with:
          name: "${{ needs.prepare-release.outputs.tag }}"
          tag: "${{ needs.prepare-release.outputs.tag }}"
          draft: true
          artifacts: "dist/*.tar.gz"
          makeLatest: true
