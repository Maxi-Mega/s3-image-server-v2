s3:
  mode: "polling"
  pollingPeriod: "30s"
  endpoint: "localhost:9000"

ui:
  map:
    pmtilesURL: "localhost:3000/{z}/{x}/{y}.pmtiles"
    pmtilesStyleURL: "localhost:3000/protomap-styles.json"

products:
  externalViewers:
    viewer1: "localhost:8080"
  dynamicData:
    fileSelectors:
      preview:
        regex: "preview.jpg$"
        kind: cached
        link: true
      geonames:
        regex: "geonames.json$"
        kind: cached
        link: true
    expressions:
      key: "'value'"

  imageGroups:
    - groupName: "Group 1"

      dynamicData:
        fileSelectors:
          geonames:
            regex: "geonames.json$"
            kind: cached
            link: true
        expressions:
          image: "'DIR/DIR2/IMAGE.tif'"

      types:
        - name: "1"
          displayName: "One"
          dynamicData:
            expressions:
              key: "'value type'"
        - name: "2"
          displayName: "Two"
          previewSuffix: "other"
          dynamicData:
            fileSelectors:
              localization:
                regex: "localization.json$"
                kind: cached
                link: true
              product:
                regex: "product.tif$"
                kind: fullProductSignedURL(urlParams)
                link: true
              ext:
                regex: "ext.typ$"
                kind: externalViewerURL(viewer1, extUri)
            expressions:
              urlParams: '{"p": "val", "n": 5}'
              extUri: '_s3Uri("ext")'

log:
  colorLogs: false
  JSONLogFormat: true
  JSONLogFields:
    f1: "field"
    f2: 7

monitoring:
  prometheusInstanceLabel: "instance"
  requestDurationBuckets:
    min: 10ms
    max: 5s
  s3ListDurationBuckets:
    min: 100ms
    max: 1s
    count: 5